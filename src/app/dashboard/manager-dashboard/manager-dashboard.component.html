<div class="container-custom py-6">
  <h1 class="text-2xl font-semibold text-gray-900">Dashboard</h1>

  <!-- Loading State -->
  <div *ngIf="loading" class="mt-6 flex justify-center">
    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
  </div>

  <!-- Error State -->
  <div *ngIf="error && !loading" class="mt-6 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
    {{ error }}
  </div>

  <!-- Dashboard Cards -->
  <div *ngIf="!loading && !error && dashboardData" class="mt-6 grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-3">
    <!-- Total Transactions -->
    <app-card title="Total Transactions" [hover]="true" class="cursor-pointer">
      <div class="flex items-center">
        <div class="flex-shrink-0 bg-blue-500 rounded-md p-3">
          <svg class="h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
          </svg>
        </div>
        <div class="ml-5">
          <p class="text-2xl font-bold text-gray-900">{{ dashboardData?.TotalTransactions }}</p>
        </div>
      </div>
    </app-card>

    <!-- Visit Pending Count -->
    <app-card title="Visits Pending" [hover]="true" class="cursor-pointer">
      <div class="flex items-center">
        <div class="flex-shrink-0 bg-yellow-500 rounded-md p-3">
          <svg class="h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <div class="ml-5">
          <p class="text-2xl font-bold text-gray-900">{{ dashboardData?.VisitPendingCount }}</p>
        </div>
      </div>
    </app-card>

    <!-- Visit Completed Count -->
    <app-card title="Visits Completed" [hover]="true" class="cursor-pointer">
      <div class="flex items-center">
        <div class="flex-shrink-0 bg-green-500 rounded-md p-3">
          <svg class="h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <div class="ml-5">
          <p class="text-2xl font-bold text-gray-900">{{ dashboardData?.VisitCompletedCount }}</p>
        </div>
      </div>
    </app-card>

    <!-- Total Bank Clients -->
    <app-card title="Total Bank Clients" [hover]="true" class="cursor-pointer">
      <div class="flex items-center">
        <div class="flex-shrink-0 bg-indigo-500 rounded-md p-3">
          <svg class="h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
          </svg>
        </div>
        <div class="ml-5">
          <p class="text-2xl font-bold text-gray-900">{{ dashboardData?.TotalBankClients }}</p>
        </div>
      </div>
    </app-card>

    <!-- Report Pending Count -->
    <app-card title="Reports Pending" [hover]="true" class="cursor-pointer">
      <div class="flex items-center">
        <div class="flex-shrink-0 bg-red-500 rounded-md p-3">
          <svg class="h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
        </div>
        <div class="ml-5">
          <p class="text-2xl font-bold text-gray-900">{{ dashboardData?.ReportPendingCount }}</p>
        </div>
      </div>
    </app-card>

    <!-- Document Pending Count -->
    <app-card title="Documents Pending" [hover]="true" class="cursor-pointer">
      <div class="flex items-center">
        <div class="flex-shrink-0 bg-orange-500 rounded-md p-3">
          <svg class="h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
        </div>
        <div class="ml-5">
          <p class="text-2xl font-bold text-gray-900">{{ dashboardData?.DocumentPendingCount }}</p>
        </div>
      </div>
    </app-card>
  </div>
</div>
