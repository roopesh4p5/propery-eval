<!-- Responsive sidebar for all screen sizes -->
<div class="w-48 sm:w-56 lg:w-64 h-full">
  <div class="h-full border-r border-gray-200 bg-white">
    <div class="h-full pb-4 overflow-y-auto">
      <nav class="mt-5 px-1 sm:px-2 bg-white space-y-1">
        <ng-container *ngFor="let item of menuItems">
          <a *ngIf="isMenuItemVisible(item)"
             [routerLink]="item.route"
             routerLinkActive="bg-gray-100 text-gray-900"
             [routerLinkActiveOptions]="{exact: item.route === '/dashboard'}"
             class="group flex items-center px-1 sm:px-2 py-2 text-xs sm:text-sm font-medium rounded-md text-gray-600 hover:bg-gray-50 hover:text-gray-900">
            <svg class="mr-2 sm:mr-3 h-5 w-5 sm:h-6 sm:w-6 text-gray-400 group-hover:text-gray-500 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon" />
            </svg>
            <span class="truncate">{{ item.label }}</span>
          </a>
        </ng-container>
      </nav>
    </div>
  </div>
</div>
