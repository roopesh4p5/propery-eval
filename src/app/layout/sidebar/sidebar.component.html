<div class="h-full bg-white" [class.hidden]="!isOpen">
  <!-- Mobile sidebar -->
  <div class="fixed inset-0 flex z-40 lg:hidden" role="dialog" aria-modal="true" *ngIf="isOpen">
    <div class="fixed inset-0 bg-gray-600 bg-opacity-75" aria-hidden="true"></div>

    <div class="relative flex-1 flex flex-col max-w-xs w-full bg-white">
      <div class="absolute top-0 right-0 -mr-12 pt-2">
        <button type="button" class="ml-1 flex items-center justify-center h-10 w-10 rounded-full focus:outline-none focus:ring-2 focus:ring-inset focus:ring-white">
          <span class="sr-only">Close sidebar</span>
          <svg class="h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <div class="flex-1 pt-5 pb-4 overflow-y-auto">
        <nav class="mt-5 px-2 space-y-1">
          <ng-container *ngFor="let item of menuItems">
            <a *ngIf="isMenuItemVisible(item)"
               [routerLink]="item.route"
               routerLinkActive="bg-gray-100 text-gray-900"
               [routerLinkActiveOptions]="{exact: item.route === '/dashboard'}"
               class="group flex items-center px-2 py-2 text-base font-medium rounded-md text-gray-600 hover:bg-gray-50 hover:text-gray-900">
              <svg class="mr-4 h-6 w-6 text-gray-400 group-hover:text-gray-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon" />
              </svg>
              {{ item.label }}
            </a>
          </ng-container>
        </nav>
      </div>
    </div>

    <div class="flex-shrink-0 w-14">
      <!-- Force sidebar to shrink to fit close icon -->
    </div>
  </div>

  <!-- Static sidebar for desktop -->
  <div class="hidden lg:block h-full">
    <div class="w-64 h-full">
      <div class="h-full border-r border-gray-200 bg-white">
        <div class="h-full pt-5 pb-4 overflow-y-auto">
          <nav class="mt-5 px-2 bg-white space-y-1">
            <ng-container *ngFor="let item of menuItems">
              <a *ngIf="isMenuItemVisible(item)"
                 [routerLink]="item.route"
                 routerLinkActive="bg-gray-100 text-gray-900"
                 [routerLinkActiveOptions]="{exact: item.route === '/dashboard'}"
                 class="group flex items-center px-2 py-2 text-sm font-medium rounded-md text-gray-600 hover:bg-gray-50 hover:text-gray-900">
                <svg class="mr-3 h-6 w-6 text-gray-400 group-hover:text-gray-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon" />
                </svg>
                {{ item.label }}
              </a>
            </ng-container>
          </nav>
        </div>
      </div>
    </div>
  </div>
</div>
