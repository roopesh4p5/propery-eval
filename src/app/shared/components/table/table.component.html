<div class="overflow-x-auto">
  <table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gray-50">
      <tr>
        <th *ngIf="selectable" scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
          Select
        </th>
        <th *ngFor="let column of columns" scope="col" 
            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
            [class.cursor-pointer]="column.sortable"
            (click)="onSort(column)">
          <div class="flex items-center">
            {{ column.label }}
            <ng-container *ngIf="column.sortable">
              <svg *ngIf="sortColumn !== column.key" xmlns="http://www.w3.org/2000/svg" class="ml-1 h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
              </svg>
              <svg *ngIf="sortColumn === column.key && sortDirection === 'asc'" xmlns="http://www.w3.org/2000/svg" class="ml-1 h-4 w-4 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" />
              </svg>
              <svg *ngIf="sortColumn === column.key && sortDirection === 'desc'" xmlns="http://www.w3.org/2000/svg" class="ml-1 h-4 w-4 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
              </svg>
            </ng-container>
          </div>
        </th>
      </tr>
    </thead>
    <tbody class="bg-white divide-y divide-gray-200">
      <ng-container *ngIf="!loading; else loadingTemplate">
        <tr *ngFor="let item of data" 
            class="hover:bg-gray-50 cursor-pointer"
            [class.bg-blue-50]="isSelected(item)"
            (click)="onRowClick(item)">
          <td *ngIf="selectable" class="px-6 py-4 whitespace-nowrap">
            <input type="checkbox" 
                  [checked]="isSelected(item)" 
                  (click)="toggleSelection($event, item)"
                  class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
          </td>
          <td *ngFor="let column of columns" class="px-6 py-4 whitespace-nowrap">
            <div class="text-sm text-gray-900">
              {{ column.format ? column.format(item[column.key]) : item[column.key] }}
            </div>
          </td>
        </tr>
        <tr *ngIf="data.length === 0">
          <td [attr.colspan]="selectable ? columns.length + 1 : columns.length" class="px-6 py-4 text-center text-sm text-gray-500">
            No data available
          </td>
        </tr>
      </ng-container>
    </tbody>
  </table>
</div>

<div *ngIf="showPagination && totalPages > 1" class="flex items-center justify-between px-4 py-3 bg-white border-t border-gray-200 sm:px-6">
  <div class="flex-1 flex justify-between sm:hidden">
    <button [disabled]="currentPage === 1" 
            (click)="onPageChange(currentPage - 1)"
            class="relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50"
            [class.opacity-50]="currentPage === 1">
      Previous
    </button>
    <button [disabled]="currentPage === totalPages" 
            (click)="onPageChange(currentPage + 1)"
            class="ml-3 relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50"
            [class.opacity-50]="currentPage === totalPages">
      Next
    </button>
  </div>
  <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
    <div>
      <p class="text-sm text-gray-700">
        Showing
        <span class="font-medium">{{ (currentPage - 1) * pageSize + 1 }}</span>
        to
        <span class="font-medium">{{ Math.min(currentPage * pageSize, totalItems) }}</span>
        of
        <span class="font-medium">{{ totalItems }}</span>
        results
      </p>
    </div>
    <div>
      <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" aria-label="Pagination">
        <!-- First Page Button -->
        <button *ngIf="showFirstPage"
                (click)="onPageChange(1)"
                class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
          <span class="sr-only">First</span>
          <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M15.707 15.707a1 1 0 01-1.414 0l-5-5a1 1 0 010-1.414l5-5a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 010 1.414zm-6 0a1 1 0 01-1.414 0l-5-5a1 1 0 010-1.414l5-5a1 1 0 011.414 1.414L5.414 10l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
          </svg>
        </button>

        <!-- Previous Button -->
        <button [disabled]="currentPage === 1"
                (click)="onPageChange(currentPage - 1)"
                class="relative inline-flex items-center px-2 py-2 border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50"
                [class.opacity-50]="currentPage === 1"
                [class.rounded-l-md]="!showFirstPage">
          <span class="sr-only">Previous</span>
          <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" />
          </svg>
        </button>

        <!-- Page Numbers -->
        <button *ngFor="let page of pages"
                (click)="onPageChange(page)"
                [ngClass]="{'bg-blue-50 border-blue-500 text-blue-600': page === currentPage, 'bg-white border-gray-300 text-gray-500 hover:bg-gray-50': page !== currentPage}"
                class="relative inline-flex items-center px-4 py-2 border text-sm font-medium">
          {{ page }}
        </button>

        <!-- Next Button -->
        <button [disabled]="currentPage === totalPages"
                (click)="onPageChange(currentPage + 1)"
                class="relative inline-flex items-center px-2 py-2 border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50"
                [class.opacity-50]="currentPage === totalPages"
                [class.rounded-r-md]="!showLastPage">
          <span class="sr-only">Next</span>
          <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
          </svg>
        </button>

        <!-- Last Page Button -->
        <button *ngIf="showLastPage"
                (click)="onPageChange(totalPages)"
                class="relative inline-flex items-center px-2 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
          <span class="sr-only">Last</span>
          <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M4.293 15.707a1 1 0 001.414 0l5-5a1 1 0 000-1.414l-5-5a1 1 0 00-1.414 1.414L8.586 10 4.293 14.293a1 1 0 000 1.414zm6 0a1 1 0 001.414 0l5-5a1 1 0 000-1.414l-5-5a1 1 0 00-1.414 1.414L15.586 10l-4.293 4.293a1 1 0 000 1.414z" clip-rule="evenodd" />
          </svg>
        </button>
      </nav>
    </div>
  </div>
</div>

<ng-template #loadingTemplate>
  <tr>
    <td [attr.colspan]="selectable ? columns.length + 1 : columns.length" class="px-6 py-4">
      <div class="flex justify-center">
        <app-loader [size]="'md'" [color]="'primary'" [text]="'Loading data...'"></app-loader>
      </div>
    </td>
  </tr>
</ng-template>
