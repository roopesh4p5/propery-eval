<header class="bg-white shadow w-full">
  <div class="px-2 sm:px-4 lg:px-8">
    <div class="flex justify-between h-16">
      <div class="flex px-2 lg:px-0">
        <div class="flex-shrink-0 flex items-center">
          <button class="lg:hidden p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-blue-500" (click)="onToggleSidebar()">
            <span class="sr-only">Open sidebar</span>
            <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
          <a routerLink="/dashboard" class="flex-shrink-0 flex items-center">
            <span class="text-xl font-bold text-blue-600">Propery Valuation,
Advisory Consultancy</span>
          </a>
        </div>
      </div>



      <div class="hidden lg:ml-4 lg:flex lg:items-center">
        <!-- Profile dropdown --> 
        <div class="ml-4 relative flex-shrink-0">
          <div>
            <button type="button" class="bg-white  flex text-sm focus:outline-none  " (click)="toggleDropdown()">
              <span class="sr-only">Open user menu</span>
              <div class="h-8 p-1 px-10 rounded-md border  bg-slate-100 flex items-center justify-center ">
                {{ authService.currentUserValue?.firstName || authService.currentUserValue?.email }}
              </div>
            </button>
          </div>

          <div *ngIf="isDropdownOpen" class="origin-top-right absolute right-0 mt-2 w-48 rounded-md shadow-lg py-1 bg-white ring-1 ring-black ring-opacity-5 focus:outline-none" role="menu" aria-orientation="vertical" aria-labelledby="user-menu-button" tabindex="-1">
            <a href="javascript:void(0)" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" role="menuitem" tabindex="-1" (click)="logout()">Sign out</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
