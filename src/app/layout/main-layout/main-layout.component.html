<div class="min-h-screen bg-gray-100 flex flex-col">
  <!-- Fixed Header -->
  <div class="fixed top-0 left-0 right-0 z-50">
    <app-header (toggleSidebar)="toggleSidebar()"></app-header>
  </div>

  <!-- Main Content Area with Fixed Sidebar -->
  <div class="flex pt-16"> <!-- Add padding-top to account for fixed header height -->
    <!-- Fixed Sidebar -->
    <div class="fixed left-0 top-16 bottom-0 z-40">
      <app-sidebar [isOpen]="isSidebarOpen"></app-sidebar>
    </div>

    <!-- Scrollable Content Area -->
    <div class="flex-1 ml-0 lg:ml-64 main-content-area"> <!-- Add margin-left to account for sidebar width on large screens -->
      <main class="py-6 px-4">
        <router-outlet></router-outlet>
      </main>

      <app-footer></app-footer>
    </div>
  </div>
</div>
