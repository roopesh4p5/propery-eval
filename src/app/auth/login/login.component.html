<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8">
    <div>
      <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
        Propery Evaluation System
      </h2>
      <p class="mt-2 text-center text-sm text-gray-600">
        Sign in to your account
      </p>
    </div>
    
    <app-alert *ngIf="error" type="error" [message]="error" (dismissed)="error = ''"></app-alert>
    
    <form class="mt-8 space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="rounded-md shadow-sm -space-y-px">
        <div>
          <label for="email" class="sr-only">Email address</label>
          <input id="email" name="email" type="email" formControlName="email" autocomplete="email" required
                 class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm"
                 placeholder="Email address"
                 [ngClass]="{'border-red-500': f['email'].invalid && f['email'].touched}">
          <div *ngIf="f['email'].invalid && f['email'].touched" class="text-red-500 text-xs mt-1">
            <div *ngIf="f['email'].errors?.['required']">Email is required</div>
            <div *ngIf="f['email'].errors?.['email']">Please enter a valid email</div>
          </div>
        </div>
        <div>
          <label for="password" class="sr-only">Password</label>
          <input id="password" name="password" type="password" formControlName="password" autocomplete="current-password" required
                 class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm"
                 placeholder="Password"
                 [ngClass]="{'border-red-500': f['password'].invalid && f['password'].touched}">
          <div *ngIf="f['password'].invalid && f['password'].touched" class="text-red-500 text-xs mt-1">
            <div *ngIf="f['password'].errors?.['required']">Password is required</div>
          </div>
        </div>
      </div>

      <div>
        <app-button 
          type="submit" 
          [fullWidth]="true" 
          [loading]="loading" 
          [disabled]="loginForm.invalid || loading">
          Sign in
        </app-button>
      </div>
    </form>
  </div>
</div>
