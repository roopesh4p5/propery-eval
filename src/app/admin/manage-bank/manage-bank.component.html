<div class="container-custom py-6">
  <div class="text-center mb-8">
    <h1 class="text-3xl font-bold text-gray-900">Manage Bank</h1>
    <p class="mt-2 text-gray-600">Add and manage banks</p>
  </div>

  <!-- Success and Error Messages -->
  <div class=" mx-auto mb-6">
    <app-alert *ngIf="success" type="success" [message]="success" (dismissed)="success = ''"></app-alert>
    <app-alert *ngIf="error" type="error" [message]="error" (dismissed)="error = ''"></app-alert>
  </div>

  <!-- Add Bank Form -->
  <div class="mt-6  mx-auto bank-form-container">
    <app-card title="Add Bank" [hover]="false" [shadow]="'lg'" [rounded]="'lg'">
      <form [formGroup]="bankForm" (ngSubmit)="onSubmit()">
        <!-- Form Layout -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Bank Name Field -->
          <div>
            <label for="bankName" class="block text-sm font-medium text-gray-700">Bank Name *</label>
            <input
              type="text"
              id="bankName"
              formControlName="bankName"
              class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
              placeholder="Enter new Bank Name"
              [ngClass]="{'border-red-500': f['bankName'].invalid && f['bankName'].touched}"
            >
            <div *ngIf="f['bankName'].invalid && f['bankName'].touched" class="text-red-500 text-xs mt-1">
              <div *ngIf="f['bankName'].errors?.['required']">Bank Name is required</div>
            </div>
          </div>
        </div>

        <!-- Form Buttons -->
        <div class="mt-8 flex justify-end">
          <app-button
            type="submit"
            variant="primary"
            size="lg"
            [loading]="submitting"
            [disabled]="bankForm.invalid || submitting">
            Submit
          </app-button>
        </div>
      </form>
    </app-card>
  </div>

  <!-- Bank List -->
  <div class="mt-10 max-w-7xl mx-auto">
    <app-card title="Bank List" [hover]="false" [shadow]="'lg'" [rounded]="'lg'">
      <!-- Loading State -->
      <div *ngIf="loading" class="flex justify-center py-8">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
      </div>

      <!-- Empty State -->
      <div *ngIf="!loading && banks.length === 0" class="text-center py-8">
        <p class="text-gray-500">No banks found</p>
      </div>

      <!-- Bank Table -->
      <div *ngIf="!loading && banks.length > 0" class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Bank</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
            </tr>
          </thead>
          <tbody class="bg-white divide-y divide-gray-200">
            <tr *ngFor="let bank of paginatedBanks">
              <td class="px-6 py-4 whitespace-nowrap">
                <div class="text-sm font-medium text-gray-900">{{ bank.Bank }}</div>
              </td>
              <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                <div class="flex space-x-2">
                  <button
                    (click)="deleteBank(bank.BankID || 0)"
                    class="text-red-600 hover:text-red-900"
                    title="Delete">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>

        <!-- Pagination -->
        <div *ngIf="totalPages > 1" class="px-4 py-3 flex items-center justify-between border-t border-gray-200 sm:px-6">
          <div class="flex-1 flex justify-between sm:hidden">
            <button
              (click)="changePage(currentPage - 1)"
              [disabled]="currentPage === 1"
              [ngClass]="{'opacity-50 cursor-not-allowed': currentPage === 1}"
              class="relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
              Previous
            </button>
            <button
              (click)="changePage(currentPage + 1)"
              [disabled]="currentPage === totalPages"
              [ngClass]="{'opacity-50 cursor-not-allowed': currentPage === totalPages}"
              class="ml-3 relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
              Next
            </button>
          </div>
          <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
            <div>
              <p class="text-sm text-gray-700">
                Showing
                <span class="font-medium">{{ (currentPage - 1) * pageSize + 1 }}</span>
                to
                <span class="font-medium">{{ (currentPage * pageSize > totalItems) ? totalItems : currentPage * pageSize }}</span>
                of
                <span class="font-medium">{{ totalItems }}</span>
                results
              </p>
            </div>
            <div>
              <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" aria-label="Pagination">
                <button
                  (click)="changePage(currentPage - 1)"
                  [disabled]="currentPage === 1"
                  [ngClass]="{'opacity-50 cursor-not-allowed': currentPage === 1}"
                  class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                  <span class="sr-only">Previous</span>
                  <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                    <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" />
                  </svg>
                </button>
                <!-- First page button -->
                <button
                  *ngIf="showFirstPage"
                  (click)="changePage(1)"
                  class="relative inline-flex items-center px-4 py-2 border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                  1
                </button>
                <span *ngIf="showFirstPage" class="relative inline-flex items-center px-4 py-2 border border-gray-300 bg-white text-sm font-medium text-gray-500">
                  ...
                </span>

                <button
                  *ngFor="let page of pages"
                  (click)="changePage(page)"
                  [ngClass]="{'bg-blue-50 border-blue-500 text-blue-600': page === currentPage, 'bg-white border-gray-300 text-gray-500 hover:bg-gray-50': page !== currentPage}"
                  class="relative inline-flex items-center px-4 py-2 border text-sm font-medium">
                  {{ page }}
                </button>

                <!-- Last page button -->
                <span *ngIf="showLastPage" class="relative inline-flex items-center px-4 py-2 border border-gray-300 bg-white text-sm font-medium text-gray-500">
                  ...
                </span>
                <button
                  *ngIf="showLastPage"
                  (click)="changePage(totalPages)"
                  class="relative inline-flex items-center px-4 py-2 border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                  {{ totalPages }}
                </button>
                <button
                  (click)="changePage(currentPage + 1)"
                  [disabled]="currentPage === totalPages"
                  [ngClass]="{'opacity-50 cursor-not-allowed': currentPage === totalPages}"
                  class="relative inline-flex items-center px-2 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                  <span class="sr-only">Next</span>
                  <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                    <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                  </svg>
                </button>
              </nav>
            </div>
          </div>
        </div>
      </div>
    </app-card>
  </div>
</div>
